version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mit_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mit_password}
      POSTGRES_DB: ${POSTGRES_DB:-macro_intelligence}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mit_user} -d ${POSTGRES_DB:-macro_intelligence}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mit_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-mit_user}:${POSTGRES_PASSWORD:-mit_password}@db:5432/${POSTGRES_DB:-macro_intelligence}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-mit_user}:${POSTGRES_PASSWORD:-mit_password}@db:5432/${POSTGRES_DB:-macro_intelligence}
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mit_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  pgdata:
